name: Validate

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          npm install --global markdownlint-cli2

      - name: Lint markdown files
        run: |
          markdownlint-cli2 README.md GEMINI.md PLAN.md "skills/*/SKILL.md"

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 2
            --retry-wait-time 2
            README.md GEMINI.md PLAN.md skills/*/SKILL.md

      - name: Validate Gemini config files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          settings = Path("settings.json")
          mcp = Path("antigravity/mcp_config.json")

          for path in (settings, mcp):
              data = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(data, dict):
                  raise SystemExit(f"Expected object JSON in {path}")
              print(f"OK JSON: {path}")

          if not json.loads(mcp.read_text(encoding="utf-8")).get("mcpServers"):
              raise SystemExit("mcp_config.json must contain non-empty mcpServers")
          print("OK MCP: non-empty mcpServers")
          PY

      - name: Check required files and ignore entries
        run: |
          required_files=(.editorconfig .gitattributes .gitignore README.md GEMINI.md PLAN.md skills-manifest.lock.json)
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          required_gitignore_entries=(
            'antigravity/installation_id'
            'antigravity/user_settings.pb'
            'antigravity-browser-profile/'
          )

          for entry in "${required_gitignore_entries[@]}"; do
            if ! grep -Fqx "$entry" .gitignore; then
              echo "Missing required .gitignore entry: $entry"
              exit 1
            fi
          done

      - name: Verify shared-skill manifest hashes
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          shared = [
              "bash-developer", "ci-cd-operator", "code-review", "dotnet-developer",
              "frontend-qa", "git-hygiene", "mssql-developer", "postgresql-developer",
              "powershell-developer", "python-developer", "python-tester", "security-hygiene",
              "rust-developer", "rust-tester",
          ]
          manifest = json.loads(Path("skills-manifest.lock.json").read_text(encoding="utf-8"))
          expected = {item["name"]: item["sha256"] for item in manifest["skills"]}

          if sorted(expected) != sorted(shared):
              raise SystemExit("Manifest shared skill set does not match required list.")

          for name in shared:
              skill_path = Path("skills") / name / "SKILL.md"
              if not skill_path.exists():
                  raise SystemExit(f"Missing skill file: {skill_path}")
              digest = hashlib.sha256(skill_path.read_bytes()).hexdigest()
              if expected[name] != digest:
                  raise SystemExit(f"Manifest hash mismatch for {name}")

          print("OK: shared skills and manifest hashes verified.")
          PY
